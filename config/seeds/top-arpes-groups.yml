# =============================================================================
# Targon Nexus — ARPES 研究组种子配置
#
# 按信源等级组织, 用于调度器自动爬取和发现。
#
# SourceTier:
#   TIER_1_OFFICIAL — 大学/研究所官方网站 (每日爬取)
#   TIER_2_ACADEMIC  — 学术论文/预印本/ORCID (每周爬取)
#   TIER_3_WEB       — Google Scholar/ResearchGate 等 (每月爬取)
#   TIER_4_OTHER     — 其他网络来源 (按需爬取)
# =============================================================================

version: "1.0"
lastUpdated: "2026-07-15"

# ---------------------------------------------------------------------------
# Tier 默认配置
# ---------------------------------------------------------------------------
tierDefaults:
  TIER_1_OFFICIAL:
    qualityScore: 0.95
    crawlFrequency: "0 2 * * *"     # 每日凌晨 2 点
    maxDepth: 2
    maxPagesPerSeed: 100
    bullMQPriority: 1
  TIER_2_ACADEMIC:
    qualityScore: 0.85
    crawlFrequency: "0 4 * * 1"     # 每周一凌晨 4 点
    maxDepth: 1
    maxPagesPerSeed: 50
    bullMQPriority: 3
  TIER_3_WEB:
    qualityScore: 0.55
    crawlFrequency: "0 0 1 * *"     # 每月 1 日
    maxDepth: 1
    maxPagesPerSeed: 30
    bullMQPriority: 5
  TIER_4_OTHER:
    qualityScore: 0.25
    crawlFrequency: "manual"
    maxDepth: 1
    maxPagesPerSeed: 20
    bullMQPriority: 8

