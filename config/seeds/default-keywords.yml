# =============================================================================
# Targon Nexus — 通用学术知识图谱 种子配置
#
# 根据用户指定的关键词，自动发现并爬取相关研究组、论文、人员。
# 所有内容按信源等级组织，调度器按等级分配优先级。
#
# SourceTier:
#   TIER_1_OFFICIAL — 大学/研究所官方网站 (每日爬取, priority=1)
#   TIER_2_ACADEMIC  — 学术论文/预印本/ORCID (每周爬取, priority=3)
#   TIER_3_WEB       — Google Scholar/ResearchGate 等 (每月爬取, priority=5)
#   TIER_4_OTHER     — 其他网络来源 (按需爬取, priority=8)
#
# 用法:
#   设置环境变量 SEED_KEYWORDS="quantum computing, CRISPR, ARPES"
#   调度器将对每个关键词执行: arXiv搜索 → 机构官网发现 → 通用网页爬取
# =============================================================================

version: "2.0"
lastUpdated: "2026-07-15"

# ---------------------------------------------------------------------------
# 一、用户关键词（核心驱动）
# ---------------------------------------------------------------------------
# 环境变量 SEED_KEYWORDS 可以覆盖此列表
keywords:
  - "angle-resolved photoemission spectroscopy"
  - "topological materials"
  - "high temperature superconductivity"
  - "quantum computing"
  - "CRISPR gene editing"

# ---------------------------------------------------------------------------
# 二、Tier 默认配置（所有关键词通用）
# ---------------------------------------------------------------------------
tierDefaults:
  TIER_1_OFFICIAL:
    qualityScore: 0.95
    crawlFrequency: "0 2 * * *"
    maxDepth: 2
    maxPagesPerSeed: 100
    bullMQPriority: 1
    description: "大学/研究所官方网站 → 人员信息最权威"
  TIER_2_ACADEMIC:
    qualityScore: 0.85
    crawlFrequency: "0 4 * * 1"
    maxDepth: 1
    maxPagesPerSeed: 50
    bullMQPriority: 3
    description: "arXiv/Semantic Scholar/ORCID → 论文和引用网络"
  TIER_3_WEB:
    qualityScore: 0.55
    crawlFrequency: "0 0 1 * *"
    maxDepth: 1
    maxPagesPerSeed: 30
    bullMQPriority: 5
    description: "Google Scholar/ResearchGate/通用搜索"
  TIER_4_OTHER:
    qualityScore: 0.25
    crawlFrequency: "manual"
    maxDepth: 1
    maxPagesPerSeed: 20
    bullMQPriority: 8
    description: "按需手动触发"

