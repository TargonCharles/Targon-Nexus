# =============================================================================
# ARP — Nginx Reverse Proxy Configuration
# =============================================================================
# Routes:
#   /api/*       -> NestJS API (arp-api:3001)
#   /graphql     -> NestJS API GraphQL endpoint
#   /ws          -> WebSocket (for real-time updates)
#   /*           -> Next.js Frontend (arp-web:3000)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main buffer=16k flush=5s;

    # -------------------------------------------------------------------------
    # Performance Tuning
    # -------------------------------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size 50m;          # Allow large file uploads (datasets)
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # -------------------------------------------------------------------------
    # Proxy Cache
    # -------------------------------------------------------------------------
    # Cache path: 100 MB, 1 level, inactive purged after 7 days.
    # Used by Next.js static assets and API responses with cache headers.
    proxy_cache_path /var/cache/nginx levels=1:2
        keys_zone=static_cache:10m
        max_size=100m
        inactive=7d
        use_temp_path=off;

    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_lock on;
    proxy_cache_lock_age 5s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/x-javascript
        application/x-font-ttf
        application/octet-stream
        font/opentype
        image/svg+xml
        image/x-icon;

    # -------------------------------------------------------------------------
    # Rate Limiting Zones
    # -------------------------------------------------------------------------
    # General API rate limit: 100 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # Auth endpoints: 10 requests/minute per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # GraphQL: 50 requests/second per IP (more expensive)
    limit_req_zone $binary_remote_addr zone=gql_limit:10m rate=50r/s;

    # WebSocket connections: 5 new connections per minute per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=5r/m;
    # WebSocket concurrent connection limit per IP
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # Upstream Definitions
    # -------------------------------------------------------------------------
    upstream api_backend {
        server arp-api:3001;
        keepalive 32;
    }

    upstream web_frontend {
        server arp-web:3000;
        keepalive 16;
    }

    # -------------------------------------------------------------------------
    # Main Server Block
    # -------------------------------------------------------------------------
    server {
        listen 80 default_server;
        server_name _;

        # General connection limit
        limit_conn conn_limit 50;

        # ---------------------------------------------------------------------
        # CORS Headers
        # ---------------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ---------------------------------------------------------------------
        # Health Check (no auth, no rate limit)
        # ---------------------------------------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"arp-nginx"}';
            add_header Content-Type application/json;
        }

        # ---------------------------------------------------------------------
        # GraphQL Endpoint
        # ---------------------------------------------------------------------
        location /graphql {
            limit_req zone=gql_limit burst=20 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 10;

            proxy_pass http://api_backend/graphql;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ---------------------------------------------------------------------
        # API Routes
        # ---------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 20;

            proxy_pass http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;     # Long timeout for LLM/ETL jobs
            proxy_send_timeout 300s;

            # Strip /api prefix when forwarding? No — NestJS expects /api prefix.
            # If your API listens on root, use:
            #   rewrite ^/api/(.*)$ /$1 break;
            #   proxy_pass http://api_backend;
        }

        # ---------------------------------------------------------------------
        # Authentication Endpoints (stricter rate limiting)
        # ---------------------------------------------------------------------
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 5;

            proxy_pass http://api_backend/api/auth/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ---------------------------------------------------------------------
        # WebSocket Endpoint (real-time updates)
        # ---------------------------------------------------------------------
        location /ws {
            # Rate limit: 5 new WS connections per minute per IP, max 10 concurrent
            limit_req zone=ws_limit burst=3 nodelay;
            limit_req_status 429;
            limit_conn ws_conn 10;

            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;    # 1 hour max per connection
        }

        # ---------------------------------------------------------------------
        # Next.js Static Assets (long cache)
        # ---------------------------------------------------------------------
        location /_next/static/ {
            proxy_cache static_cache;
            proxy_pass http://web_frontend/_next/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /static/ {
            proxy_cache static_cache;
            proxy_pass http://web_frontend/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        location /favicon.ico {
            proxy_pass http://web_frontend/favicon.ico;
            access_log off;
            add_header Cache-Control "public, max-age=86400";
        }

        # ---------------------------------------------------------------------
        # Next.js Pages & API Routes (SSR)
        # ---------------------------------------------------------------------
        location / {
            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # Next.js uses custom 404 pages, do not intercept
            proxy_intercept_errors off;
        }

        # ---------------------------------------------------------------------
        # Error Pages
        # ---------------------------------------------------------------------
        error_page 429 /429.html;
        location = /429.html {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please try again later."}';
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type application/json;
            return 502 '{"error":"Bad Gateway","message":"A backend service is temporarily unavailable."}';
        }
    }

    # =========================================================================
    # HTTPS Server Block
    # =========================================================================
    # Development: self-signed certificate (generated via:
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout infra/certs/arp-key.pem -out infra/certs/arp-cert.pem \
    #     -subj "/CN=localhost")
    #
    # Production: replace cert paths with Let's Encrypt certificates.
    # Use certbot with the webroot plugin to auto-renew:
    #   certbot certonly --webroot -w /var/www/certbot -d arpes.network
    # =========================================================================
    server {
        listen 443 ssl http2 default_server;
        server_name _;

        # SSL certificate paths (mount in docker-compose or use a volume)
        ssl_certificate     /etc/nginx/certs/arp-cert.pem;
        ssl_certificate_key /etc/nginx/certs/arp-key.pem;

        # Modern SSL configuration (Mozilla intermediate, 2025)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS (enable in production: max-age=63072000)
        add_header Strict-Transport-Security "max-age=86400" always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection limits
        limit_conn conn_limit 50;

        # -- Health Check ----------------------------------------------------
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"arp-nginx-https"}';
            add_header Content-Type application/json;
        }

        # -- GraphQL ---------------------------------------------------------
        location /graphql {
            limit_req zone=gql_limit burst=20 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 10;
            proxy_pass http://api_backend/graphql;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # -- API -------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            limit_conn conn_limit 20;
            proxy_pass http://api_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # -- WebSocket -------------------------------------------------------
        location /ws {
            limit_req zone=ws_limit burst=3 nodelay;
            limit_req_status 429;
            limit_conn ws_conn 10;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
        }

        # -- Static assets (cached) -----------------------------------------
        location /_next/static/ {
            proxy_cache static_cache;
            proxy_pass http://web_frontend/_next/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # -- Frontend SSR ---------------------------------------------------
        location / {
            proxy_pass http://web_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 60s;
            proxy_intercept_errors off;
        }
    }
}
